name: Trello ETL Automation

on:
  schedule:
    - cron: '0 11 * * *' # Roda às 08:00 no horário de Brasília (UTC-3)
  push:
    branches: [ main ]
  workflow_dispatch: # Permite rodar manualmente pelo site do GitHub

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL Script
        env:
          # Aqui o GitHub pega as senhas que você vai cadastrar no site dele
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: python app/main.py